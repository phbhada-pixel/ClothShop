<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>स्टॉक मॅनेजमेंट</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4 shadow">
    <div class="container-fluid justify-content-center gap-3">
        <a href="index.html" class="btn btn-outline-light">🛍️ बिलिंग</a>
        <a href="inventory.html" class="btn btn-primary">📦 स्टॉक (Inventory)</a>
        <a href="dashboard.html" class="btn btn-outline-light">📊 डॅशबोर्ड</a>
    </div>
</nav>

<div class="container" style="max-width: 600px;">
    <div class="card p-4 shadow-sm border-0 rounded-4">
        <h4 class="text-center text-primary mb-4">➕ नवीन माल (Stock In) जोडा</h4>
        <form id="inventoryForm">
            <div class="mb-3">
                <label class="form-label fw-bold">मालाचे नाव (Item Name)</label>
                <input type="text" class="form-control" id="itemName" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">खरेदी किंमत (Purchase Price)</label>
                    <input type="number" class="form-control" id="purchasePrice" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">विक्री किंमत (Selling Price)</label>
                    <input type="number" class="form-control" id="sellingPrice" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold text-success">आलेला माल (Quantity / Stock In)</label>
                <input type="number" class="form-control form-control-lg" id="stockIn" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg" id="submitBtn">
                सेव्ह करा
            </button>
        </form>
    </div>
</div>

<script>
    // तुमची Google Apps Script URL इथे टाका
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzIwJeohLOaEDDnDM7Pylw5rPRfZl7cv5a0pogMlyr8rqa2MRFeee08Tsk1JcDhrdE_wA/exec";

    document.getElementById('inventoryForm').addEventListener('submit', function(e) {
        e.preventDefault();
        document.getElementById('submitBtn').innerText = "सेव्ह होत आहे...";
        document.getElementById('submitBtn').disabled = true;

        let payload = {
            action: "addInventory",
            itemName: document.getElementById('itemName').value,
            purchasePrice: document.getElementById('purchasePrice').value,
            sellingPrice: document.getElementById('sellingPrice').value,
            stockIn: document.getElementById('stockIn').value
        };

        fetch(SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === "success") {
                alert("✅ माल यशस्वीरित्या ॲड झाला!");
                document.getElementById('inventoryForm').reset();
            }
            document.getElementById('submitBtn').innerText = "सेव्ह करा";
            document.getElementById('submitBtn').disabled = false;
        }).catch(err => alert("एरर आली. पुन्हा प्रयत्न करा."));
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees - Cloth Shop ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 font-sans flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-gray-800 text-white flex flex-col shadow-xl">
        <div class="p-6"><h2 class="text-2xl font-bold text-blue-400">Shop ERP</h2></div>
        <nav class="flex-1 mt-4">
            <a href="dashboard.html" class="block py-3 px-6 hover:bg-gray-700">📊 डॅशबोर्ड</a>
            <a href="employees.html" class="block py-3 px-6 bg-gray-700 border-l-4 border-blue-500">👨‍💼 कर्मचारी (Employees)</a>
            <a href="settings.html" class="block py-3 px-6 hover:bg-gray-700">⚙️ सेटिंग्ज (Settings)</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white dark:bg-gray-800 shadow p-4 flex justify-between items-center">
            <h2 class="text-xl font-semibold text-gray-800 dark:text-white">कर्मचारी आणि अधिकार (Role Access)</h2>
            <button id="openEmpModalBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded shadow font-medium">
                + नवीन कर्मचारी जोडा
            </button>
        </header>

        <div class="p-6 flex-1 overflow-y-auto">
            <!-- Employee Table -->
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 dark:bg-gray-700 text-gray-600 dark:text-gray-300">
                        <tr>
                            <th class="p-4 border-b">नाव</th>
                            <th class="p-4 border-b">ईमेल (Login ID)</th>
                            <th class="p-4 border-b">रोल (Role)</th>
                            <th class="p-4 border-b">स्टेटस</th>
                            <th class="p-4 border-b text-center">कृती</th>
                        </tr>
                    </thead>
                    <tbody id="employeeTableBody" class="text-gray-700 dark:text-gray-400">
                        <!-- Dynamic content -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Add Employee Modal -->
    <div id="employeeModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-xl w-full max-w-md">
            <h3 class="text-lg font-bold text-gray-800 dark:text-white mb-4">नवीन कर्मचारी जोडा</h3>
            
            <form id="employeeForm" class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-600 dark:text-gray-400">संपूर्ण नाव</label>
                    <input type="text" id="empName" required class="w-full p-2 border rounded mt-1 dark:bg-gray-700 dark:text-white">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 dark:text-gray-400">ईमेल (लॉगिन आयडी)</label>
                    <input type="email" id="empEmail" required class="w-full p-2 border rounded mt-1 dark:bg-gray-700 dark:text-white">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 dark:text-gray-400">पासवर्ड (Default)</label>
                    <input type="password" id="empPass" required class="w-full p-2 border rounded mt-1 dark:bg-gray-700 dark:text-white">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 dark:text-gray-400">रोल (Role)</label>
                    <select id="empRole" class="w-full p-2 border rounded mt-1 dark:bg-gray-700 dark:text-white">
                        <option value="Manager">मॅनेजर (Manager)</option>
                        <option value="Cashier">कॅशिअर (Cashier)</option>
                        <option value="Salesman">सेल्समन (Salesman)</option>
                    </select>
                </div>
                
                <div class="flex justify-end space-x-2 pt-4">
                    <button type="button" id="closeEmpModal" class="px-4 py-2 border rounded text-gray-600 dark:text-gray-300">रद्द करा</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">सेव्ह करा</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="modules/employees/employees.js"></script>
</body>
</html>

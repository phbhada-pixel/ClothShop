<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Bill - Cloth Shop ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 font-sans flex h-screen overflow-hidden">
    
    <!-- Sidebar Placeholder (Assume identical to products.html) -->
    <aside class="w-64 bg-gray-800 text-white flex flex-col shadow-xl hidden md:flex">
        <div class="p-6"><h2 class="text-2xl font-bold text-blue-400">Shop ERP</h2></div>
        <nav class="flex-1 mt-4">
             <a href="dashboard.html" class="block py-3 px-6 hover:bg-gray-700">📊 डॅशबोर्ड</a>
             <a href="purchase.html" class="block py-3 px-6 bg-gray-700 border-l-4 border-blue-500">📥 खरेदी (Purchase)</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        <div class="p-6">
            <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-6">नवीन खरेदी बिल (Purchase Entry)</h2>
            
            <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow mb-6">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                    <!-- १. सप्लायर (Supplier) -->
<div class="mb-4">
    <label class="block text-gray-700 font-bold mb-2">सप्लायर (Supplier Name)</label>
    <input type="text" id="supplierName" placeholder="सप्लायरचे नाव टाका" class="w-full p-2 border rounded focus:outline-none focus:border-blue-500">
</div>

<!-- २. Invoice Number -->
<div class="mb-4">
    <label class="block text-gray-700 font-bold mb-2">Invoice Number</label>
    <input type="text" id="purchaseInvoiceNo" placeholder="बिलाचा नंबर टाका" class="w-full p-2 border rounded focus:outline-none focus:border-blue-500">
</div>

<!-- ३. प्रॉडक्ट सर्च करण्यासाठी Barcode/SKU बॉक्स -->
<div class="mb-6 bg-blue-50 p-4 rounded-lg border border-blue-200">
    <label class="block text-blue-800 font-bold mb-2">Barcode किंवा SKU स्कॅन करा / सर्च करा...</label>
    <div class="flex gap-2">
        <input type="text" id="purchaseBarcodeInput" placeholder="उदा. MEN-45812 टाईप करून Enter दाबा" class="w-full p-3 border border-blue-400 rounded shadow-sm focus:outline-none focus:border-blue-600 font-mono">
        <button id="addPurchaseItemBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded font-bold">जोडा (Add)</button>
    </div>
</div>
                </div>

                <!-- Product Search/Add to Bill -->
                <div class="flex space-x-2 mt-6">
                    <input type="text" placeholder="Barcode किंवा SKU स्कॅन करा / सर्च करा..." class="flex-1 p-3 border rounded-lg bg-gray-50 dark:bg-gray-700 dark:text-white">
                    <button class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700">जोडा (Add)</button>
                </div>
            </div>

            <!-- Items Table -->
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow overflow-hidden mb-6">
                <table class="w-full text-left">
                    <thead class="bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300">
                        <tr>
                            <th class="p-3">प्रॉडक्ट</th>
                            <th class="p-3">दर (Rate)</th>
                            <th class="p-3 w-32">Qty</th>
                            <th class="p-3">GST %</th>
                            <th class="p-3">एकूण (Total)</th>
                            <th class="p-3 text-center">काढा</th>
                        </tr>
                    </thead>
                    <tbody id="purchaseItemsTable" class="text-gray-700 dark:text-gray-300">
                        <!-- Dynamic items -->
                    </tbody>
                </table>
            </div>

            <!-- Bill Summary Calculation -->
            <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow flex justify-end">
                <div class="w-full md:w-1/3 space-y-3 text-right text-gray-800 dark:text-white">
                    <div class="flex justify-between"><span>Subtotal:</span> <span id="subTotal">₹0.00</span></div>
                    <div class="flex justify-between"><span>GST Amount:</span> <span id="taxTotal">₹0.00</span></div>
                    <div class="flex justify-between">
                        <span>Discount/Other:</span> 
                        <input type="number" value="0" class="w-24 p-1 border rounded text-right dark:bg-gray-700">
                    </div>
                    <div class="flex justify-between font-bold text-xl border-t pt-2">
                        <span>Grand Total:</span> <span id="grandTotal" class="text-blue-600">₹0.00</span>
                    </div>
                    <button class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg mt-4 shadow-lg">
                        बिल सेव्ह करा (Save & Update Stock)
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="modules/purchase/purchase.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Cloth Shop ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Check for Dark Mode Preference on load
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 font-sans flex h-screen overflow-hidden">

    <!-- Sidebar Placeholder -->
    <aside class="w-64 bg-gray-800 text-white flex flex-col shadow-xl">
        <div class="p-6"><h2 class="text-2xl font-bold text-blue-400">Shop ERP</h2></div>
        <nav class="flex-1 mt-4">
            <a href="dashboard.html" class="block py-3 px-6 hover:bg-gray-700">📊 डॅशबोर्ड</a>
            <a href="settings.html" class="block py-3 px-6 bg-gray-700 border-l-4 border-blue-500">⚙️ सेटिंग्ज (Settings)</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        <header class="bg-white dark:bg-gray-800 shadow p-4">
            <h2 class="text-xl font-semibold text-gray-800 dark:text-white">सिस्टम सेटिंग्ज</h2>
        </header>

        <div class="p-6 max-w-4xl space-y-6">
            
            <!-- Store Settings -->
            <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow">
                <h3 class="text-lg font-bold text-gray-800 dark:text-white mb-4">दुकानाची माहिती (Store Profile)</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-600 dark:text-gray-400">दुकानाचे नाव</label>
                        <input type="text" value="Shree Textiles & Garments" class="w-full p-2 border rounded mt-1 dark:bg-gray-700 dark:text-white">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 dark:text-gray-400">GST Number</label>
                        <input type="text" value="27AABCU9603R1Z2" class="w-full p-2 border rounded mt-1 dark:bg-gray-700 dark:text-white">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm text-gray-600 dark:text-gray-400">पत्ता (Address for Invoice)</label>
                        <textarea class="w-full p-2 border rounded mt-1 dark:bg-gray-700 dark:text-white">Main Road, Market Yard, Latur</textarea>
                    </div>
                </div>
                <button class="mt-4 bg-blue-600 text-white px-4 py-2 rounded">माहिती अपडेट करा</button>
            </div>

            <!-- Appearance -->
            <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow flex justify-between items-center">
                <div>
                    <h3 class="text-lg font-bold text-gray-800 dark:text-white">डार्क मोड (Dark Mode)</h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400">डोळ्यांचा त्रास कमी करण्यासाठी काळी थीम वापरा.</p>
                </div>
                <button id="themeToggle" class="bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white px-6 py-2 rounded-full font-bold transition">
                    🌙 Toggle Theme
                </button>
            </div>

        </div>
    </main>

    <script type="module" src="modules/settings/settings.js"></script>
</body>
</html>

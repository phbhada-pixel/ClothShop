<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS - Cloth Shop ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Print CSS: लपवण्यासाठी -->
    <style>
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 font-sans h-screen flex flex-col overflow-hidden">

    <!-- Topbar (Minimal for POS) -->
    <header class="bg-blue-600 text-white p-3 flex justify-between items-center shadow-md">
        <div class="flex items-center space-x-4">
            <a href="dashboard.html" class="font-bold text-xl hover:text-gray-200">⬅ डॅशबोर्ड</a>
            <h1 class="text-xl font-semibold border-l-2 pl-4">POS (Retail Billing)</h1>
        </div>
        <div class="text-sm">
            <span id="currentDateTime" class="mr-4">00:00:00</span>
            <span class="bg-blue-800 px-3 py-1 rounded-full">Cashier: Admin</span>
        </div>
    </header>

    <!-- Main POS Area -->
    <main class="flex-1 flex flex-col lg:flex-row overflow-hidden">
        
        <!-- Left Side: Product Search & Cart -->
        <div class="flex-1 flex flex-col p-4 space-y-4">
            <!-- Search & Barcode -->
            <div class="flex space-x-2">
                <input type="text" id="barcodeInput" placeholder="बारकोड स्कॅन करा किंवा प्रॉडक्ट शोधा... (Press F2)" class="flex-1 p-4 border-2 border-blue-300 rounded-lg text-lg focus:outline-none focus:border-blue-600 dark:bg-gray-800 dark:text-white dark:border-gray-600 shadow-sm" autofocus>
            </div>

            <!-- Cart Table -->
            <div class="flex-1 bg-white dark:bg-gray-800 rounded-lg shadow overflow-hidden flex flex-col">
                <div class="overflow-y-auto flex-1">
                    <table class="w-full text-left">
                        <thead class="bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 sticky top-0">
                            <tr>
                                <th class="p-3">क्र.</th>
                                <th class="p-3">प्रॉडक्टचे नाव</th>
                                <th class="p-3">दर (₹)</th>
                                <th class="p-3 w-24">Qty</th>
                                <th class="p-3">GST %</th>
                                <th class="p-3">एकूण (₹)</th>
                                <th class="p-3 text-center">कृती</th>
                            </tr>
                        </thead>
                        <tbody id="posCartBody" class="text-gray-800 dark:text-gray-200">
                            <!-- Items dynamically injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Right Side: Customer & Payment Details -->
        <div class="w-full lg:w-96 bg-white dark:bg-gray-800 border-l dark:border-gray-700 p-4 flex flex-col">
            <!-- Customer Detail -->
            <div class="mb-4 bg-gray-50 dark:bg-gray-700 p-4 rounded-lg shadow-inner">
                <h3 class="text-sm font-bold text-gray-600 dark:text-gray-300 mb-2">ग्राहक माहिती (Customer)</h3>
                <input type="text" placeholder="मोबाईल नंबर (Enter दाबा)" class="w-full p-2 border rounded mb-2 dark:bg-gray-800 dark:text-white dark:border-gray-600">
                <input type="text" placeholder="ग्राहकाचे नाव" class="w-full p-2 border rounded dark:bg-gray-800 dark:text-white dark:border-gray-600">
            </div>

            <!-- Bill Summary -->
            <div class="flex-1 bg-gray-50 dark:bg-gray-700 p-4 rounded-lg shadow-inner flex flex-col space-y-3 text-lg font-medium text-gray-700 dark:text-gray-200">
                <div class="flex justify-between"><span>Subtotal:</span> <span id="posSubTotal">₹0.00</span></div>
                <div class="flex justify-between"><span>Tax (GST):</span> <span id="posTax">₹0.00</span></div>
                <div class="flex justify-between items-center text-red-500">
                    <span>Discount (₹):</span> 
                    <input type="number" id="posDiscount" value="0" class="w-24 p-1 border rounded text-right dark:bg-gray-800 dark:border-gray-600">
                </div>
                <hr class="border-gray-300 dark:border-gray-600">
                <div class="flex justify-between text-2xl font-bold text-blue-600 dark:text-blue-400">
                    <span>Grand Total:</span> <span id="posGrandTotal">₹0.00</span>
                </div>
            </div>

            <!-- Payment Modes -->
            <div class="mt-4 grid grid-cols-2 gap-2">
                <button class="bg-green-100 text-green-700 hover:bg-green-200 p-3 rounded-lg font-bold border border-green-300">💵 Cash (F1)</button>
                <button class="bg-purple-100 text-purple-700 hover:bg-purple-200 p-3 rounded-lg font-bold border border-purple-300">📱 UPI (F3)</button>
                <button class="bg-blue-100 text-blue-700 hover:bg-blue-200 p-3 rounded-lg font-bold border border-blue-300">💳 Card (F4)</button>
                <button class="bg-yellow-100 text-yellow-700 hover:bg-yellow-200 p-3 rounded-lg font-bold border border-yellow-300">📒 Credit</button>
            </div>

            <!-- Action Buttons -->
            <div class="mt-4 space-y-2">
                <button onclick="window.print()" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-lg font-bold text-xl shadow-lg transition-transform transform active:scale-95">
                    🖨️ Print Invoice (Enter)
                </button>
                <button id="clearCartBtn" class="w-full bg-red-100 hover:bg-red-200 text-red-600 p-2 rounded-lg font-semibold">
                    रद्द करा (Clear Bill)
                </button>
            </div>
        </div>

    </main>

    <!-- Hidden Print Area -->
    <div id="printArea" class="hidden p-4 bg-white text-black w-80">
        <h2 class="text-center font-bold text-xl">Shop ERP ERP</h2>
        <p class="text-center text-sm">Receipt</p>
        <hr class="my-2 border-black">
        <!-- Print bill structure goes here -->
    </div>

    <script type="module" src="modules/pos/pos.js"></script>
</body>
</html>
